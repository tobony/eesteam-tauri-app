name: ci-lite

on:
  pull_request:
    paths:
      - "src/**"
      - "src-tauri/**"
      - "tests/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/ci-lite.yml"

concurrency:
  group: ci-lite-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-diff-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run build
      - run: pnpm test
      - run: git diff --check
